name: Backend CI

on:
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [ master, main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    # PostgreSQL servisi - testler için gerekebilir
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout kod
      uses: actions/checkout@v4

    - name: Python 3.11 kurulum
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: FFmpeg kurulum (audio processing için)
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Dependency'leri kur
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test environment ayarla
      working-directory: ./backend
      run: |
        echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db" > .env
        echo "SECRET_KEY=test_secret_key_for_ci" >> .env
        echo "OPENAI_API_KEY=test_key" >> .env
        echo "ASSEMBLYAI_API_KEY=test_key" >> .env

    - name: Pytest ile testleri çalıştır
      working-directory: ./backend
      run: |
        pytest tests/ -v --tb=short --color=yes
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        SECRET_KEY: test_secret_key_for_ci
        PYTHONPATH: ${{ github.workspace }}/backend

    - name: Test sonuçlarını göster
      if: always()
      run: echo "Backend testler tamamlandı!"
